<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.815 21.815 0 0112 23c0-3.517 1.009-6.799 2.753-9.571m3.44 2.04l-.054.09A13.916 13.916 0 0016 11" />
        </svg>
      </div>
      
      <ng-container *ngIf="!show2FA">
        <h1>Bienvenido</h1>
        <p>Inicia sesión para acceder al ecosistema</p>
      </ng-container>

      <ng-container *ngIf="show2FA">
        <h1>Verificación 2FA</h1>
        <p>Ingresa el código enviado a tu correo</p>
      </ng-container>
    </div>

    <!-- Step 1: Credentials -->
    <form *ngIf="!show2FA" [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Matrícula o Correo</label>
        <div class="input-wrapper">
          <input type="text" formControlName="email" placeholder="Ej. 19400000 o correo"
                 [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input type="password" formControlName="password" placeholder="••••••••"
                 [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        </div>
      </div>

      <div class="alert error" *ngIf="errorMessage">
        {{errorMessage}}
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Continuar</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <div class="auth-footer">
        <div class="links">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="register-hint">
          ¿Representas a una empresa? <a routerLink="/register-company">Regístrate aquí</a>
        </div>
      </div>
    </form>

    <!-- Step 2: 2FA Verification -->
    <form *ngIf="show2FA" [formGroup]="twoFactorForm" (ngSubmit)="onVerify2FA()" class="auth-form">
      <div class="form-group">
        <label>Código de Seguridad</label>
        <div class="input-wrapper">
          <input type="text" formControlName="code" placeholder="G-123456" maxlength="8"
                 [class.error]="twoFactorForm.get('code')?.touched && twoFactorForm.get('code')?.invalid">
        </div>
        <small class="help-text">El código expira en 5 minutos.</small>
      </div>

      <div class="alert error" *ngIf="errorMessage">
        {{errorMessage}}
      </div>

      <button type="submit" class="btn-primary" [disabled]="twoFactorForm.invalid || isLoading">
        <span *ngIf="!isLoading">Verificar Identidad</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <button type="button" class="btn-outline" (click)="cancel2FA()" [disabled]="isLoading">
        Volver al inicio
      </button>
    </form>

  </div>
</div>
