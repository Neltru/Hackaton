<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21h18M3 7v1a3 3 0 006 0V7m0 0V5a2 2 0 012-2h2a2 2 0 012 2v2m0 0h6v1a3 3 0 01-6 0V7" />
        </svg>
      </div>
      <h1>Registro de Empresa</h1>
      <p>Únete a nuestra red de vinculación profesional</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Nombre de la Empresa</label>
        <div class="input-wrapper">
          <input type="text" formControlName="nombre" placeholder="Ej. Tech Solutions"
                 [class.error]="registerForm.get('nombre')?.touched && registerForm.get('nombre')?.invalid">
        </div>
      </div>

      <div class="form-group">
        <label>Correo Electrónico Corporativo</label>
        <div class="input-wrapper">
          <input type="email" formControlName="correo" placeholder="empresa@ejemplo.com"
                 [class.error]="registerForm.get('correo')?.touched && registerForm.get('correo')?.invalid">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>RFC</label>
          <input type="text" formControlName="rfc" placeholder="ABC123456T1" maxlength="13"
                 [class.error]="registerForm.get('rfc')?.touched && registerForm.get('rfc')?.invalid">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Estado</label>
          <input type="text" formControlName="estado" placeholder="Ej. Nayarit"
                 [class.error]="registerForm.get('estado')?.touched && registerForm.get('estado')?.invalid">
        </div>
        <div class="form-group">
          <label>Municipio</label>
          <input type="text" formControlName="municipio" placeholder="Ej. Tepic"
                 [class.error]="registerForm.get('municipio')?.touched && registerForm.get('municipio')?.invalid">
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input type="password" formControlName="password" placeholder="••••••••"
                 [class.error]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
        </div>
      </div>

      <div class="alert error" *ngIf="errorMessage">
        {{errorMessage}}
      </div>

      <div class="alert success" *ngIf="successMessage">
        {{successMessage}}
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || isLoading">
        <span *ngIf="!isLoading">Registrar Empresa</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <div class="auth-footer">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a>
      </div>
    </form>
  </div>
</div>
