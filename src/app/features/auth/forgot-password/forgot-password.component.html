<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <h1>Recuperar Acceso</h1>
      <p>Ingresa tu correo para recibir instrucciones</p>
    </div>

    <form *ngIf="!isSent" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <div class="input-wrapper">
          <input type="email" formControlName="email" placeholder="tu@ejemplo.com"
                 [class.error]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
        </div>
      </div>

      <div class="alert error" *ngIf="errorMessage">
        {{errorMessage}}
      </div>

      <button type="submit" class="btn-primary" [disabled]="forgotForm.invalid || isLoading">
        <span *ngIf="!isLoading">Enviar Instrucciones</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>

      <div class="auth-footer">
        <a routerLink="/login">Volver al inicio de sesión</a>
      </div>
    </form>

    <div *ngIf="isSent" class="success-state">
      <div class="alert success">
        Hemos enviado un enlace de recuperación a tu correo electrónico. Por favor, revisa tu bandeja de entrada.
      </div>
      <div class="auth-footer">
        <a routerLink="/login" class="btn-outline">Volver al login</a>
      </div>
    </div>

  </div>
</div>
