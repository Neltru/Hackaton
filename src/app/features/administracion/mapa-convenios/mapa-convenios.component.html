<section class="mapa-page">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Mapa de calor de convenios</h1>
    </div>
    <div class="header-right">
      <select class="form-select outline" [(ngModel)]="filtroZona" (ngModelChange)="onFilterChange()">
        <option>Zona norte Nayarit</option>
        <option>Nacional</option>
        <option>Todos</option>
      </select>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Cargando mapa de calor...</p>
  </div>

  <ng-container *ngIf="!isLoading && stats">
    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Zona norte (automático)</span>
        <span class="stat-value text-blue">{{ stats.zonaNorte }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Nacional (contratación)</span>
        <span class="stat-value text-green">{{ stats.nacional }}</span>
      </div>
    </div>

    <!-- Map Visualization (ApexCharts Treemap) -->
    <div class="map-visualization-apex">
      <div class="chart-header">
        <h2 class="section-title">Concentración Geográfica (Treemap)</h2>
        <p class="section-desc">Visualización de convenios por región y volumen de actividad</p>
      </div>
      <div class="treemap-container">
        <apx-chart [series]="treemapOptions.series" [chart]="treemapOptions.chart" [title]="treemapOptions.title"
          [colors]="treemapOptions.colors" [plotOptions]="treemapOptions.plotOptions"
          [tooltip]="treemapOptions.tooltip">
        </apx-chart>
      </div>
    </div>

    <!-- Badges Bottom -->
    <div class="badges-bottom">
      <div class="badge badge-automatico">Nayarit: automático</div>
      <div class="badge badge-contratacion">Nacional: por contratación</div>
    </div>
  </ng-container>

</section>
