<section class="ranking-page">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Ranking de competencias más demandadas</h1>
    </div>
    <div class="header-right">
      <select class="form-select outline" [(ngModel)]="selectedCarrera" (ngModelChange)="onFilterChange()">
        <option>Todas las carreras</option>
        <option>TI</option>
        <option>Administración</option>
        <option>Ing. Civil</option>
        <option>Logística</option>
      </select>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Calculando ranking...</p>
  </div>

  <ng-container *ngIf="!isLoading && ranking">

    <!-- Radar Overview Section -->
    <div class="chart-radar-section">
      <h2 class="section-title">Mapa de Competencias — Vista Holística (ApexCharts Radar)</h2>
      <div class="radar-container">
        <apx-chart [series]="radarOptions.series" [chart]="radarOptions.chart" [xaxis]="radarOptions.xaxis"
          [yaxis]="radarOptions.yaxis" [stroke]="radarOptions.stroke" [colors]="radarOptions.colors"
          [fill]="radarOptions.fill" [markers]="radarOptions.markers" [grid]="radarOptions.grid"
          [tooltip]="radarOptions.tooltip">
        </apx-chart>
      </div>
    </div>

    <!-- Parallel Columns Section -->
    <div class="parallel-columns">

      <!-- Column 1: Habilidades técnicas -->
      <div class="ranking-column">
        <h2 class="column-title">Habilidades técnicas</h2>

        <div class="ranking-list">
          <div class="ranking-item" *ngFor="let hab of ranking.tecnicas; let i = index"
            [style.--delay]="i * 0.05 + 's'">
            <div class="item-name">{{ hab.nombre }}</div>
            <div class="item-track-wrapper">
              <div class="item-track">
                <div class="item-fill fill-blue" [style.width.%]="hab.puntaje"></div>
              </div>
              <div class="item-value">{{ hab.puntaje }}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Column 2: Habilidades blandas -->
      <div class="ranking-column">
        <h2 class="column-title">Habilidades blandas</h2>

        <div class="ranking-list">
          <div class="ranking-item" *ngFor="let hab of ranking.blandas; let i = index" [style.--delay]="i * 0.05 + 's'">
            <div class="item-name">{{ hab.nombre }}</div>
            <div class="item-track-wrapper">
              <div class="item-track">
                <div class="item-fill fill-green" [style.width.%]="hab.puntaje"></div>
              </div>
              <div class="item-value">{{ hab.puntaje }}</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Tendencia mensual -->
    <div class="tendencia-section">
      <h2 class="section-title">Tendencia mensual — top habilidades demandadas (ApexCharts)</h2>
      <div class="line-chart-container">
        <apx-chart [series]="lineOptions.series" [chart]="lineOptions.chart" [xaxis]="lineOptions.xaxis"
          [stroke]="lineOptions.stroke" [colors]="lineOptions.colors" [markers]="lineOptions.markers"
          [grid]="lineOptions.grid" [tooltip]="lineOptions.tooltip" [legend]="lineOptions.legend">
        </apx-chart>
      </div>
    </div>

  </ng-container>

</section>
