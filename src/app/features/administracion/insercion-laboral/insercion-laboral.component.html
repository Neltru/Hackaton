<section class="insercion-page">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Indicador de inserción laboral por carrera</h1>
    </div>
    <div class="header-right filters">
      <div class="filter-group">
        <select class="form-select" [(ngModel)]="selectedAnio" (ngModelChange)="onFilterChange()">
          <option>2025</option>
          <option>2024</option>
          <option>2023</option>
        </select>
      </div>
      <div class="filter-group">
        <select class="form-select" [(ngModel)]="selectedCarrera" (ngModelChange)="onFilterChange()">
          <option>Todas las carreras</option>
          <option>TI</option>
          <option>Administración</option>
          <option>Ing. Civil</option>
          <option>Logística</option>
          <option>Mecatrónica</option>
          <option>Contaduría</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Cargando datos del indicador...</p>
  </div>

  <ng-container *ngIf="!isLoading && stats">
    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Total egresados</span>
        <span class="stat-value">{{ stats.totalEgresados }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Contratados</span>
        <span class="stat-value">{{ stats.contratados }}</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">% inserción global</span>
        <span class="stat-value">{{ stats.porcentajeInsercion }}%</span>
      </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
      <h2 class="section-title">Análisis de inserción por carrera (ApexCharts)</h2>

      <div class="chart-container-apex">
        <apx-chart [series]="chartOptions.series" [chart]="chartOptions.chart" [xaxis]="chartOptions.xaxis"
          [plotOptions]="chartOptions.plotOptions" [colors]="chartOptions.colors" [dataLabels]="chartOptions.dataLabels"
          [grid]="chartOptions.grid" [tooltip]="chartOptions.tooltip" [annotations]="chartOptions.annotations">
        </apx-chart>
      </div>
    </div>
  </ng-container>

</section>
