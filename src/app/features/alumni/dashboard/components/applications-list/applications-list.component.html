<div class="card">
  <div class="card-header">
    <h3>MIS POSTULACIONES</h3>
  </div>

  <div class="app-list">
    @for (app of applications; track app.title) {
    <div class="app-item">
      <div class="app-info">
        <span class="app-title">{{ app.title }}</span>
        <span class="app-meta">{{ app.company }} - aplicada hace {{ app.days }} días</span>
      </div>
      <span class="status-badge" [ngClass]="'status-' + app.statusType">{{ app.status }}</span>
    </div>
    }
  </div>
</div>
