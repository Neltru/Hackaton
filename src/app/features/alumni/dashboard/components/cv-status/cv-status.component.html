<div class="card">
  <div class="card-header">
    <h3>ESTADO DEL CV</h3>
  </div>

  <div class="status-list">
    @for (item of statusItems; track item.label) {
    <div class="status-item">
      <div class="icon-container">
        @if (item.completed) {
        <svg class="icon-success" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        } @else if (item.incomplete) {
        <svg class="icon-warning" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        } @else {
        <svg class="icon-empty" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
        </svg>
        }
      </div>
      <div class="item-content">
        <div class="text-group">
          <span class="label">{{ item.label }}</span>
          <span class="desc">{{ item.description }}</span>
        </div>
        <a routerLink="/alumni/perfil" class="btn-link">{{ item.action }}</a>
      </div>
    </div>
    }
  </div>
</div>
