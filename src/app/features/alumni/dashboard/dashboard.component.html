<div class="dashboard-grid">
  <!-- Top KPI Cards -->
  <div class="kpi-row">
    <app-stat-card title="Perfil completado" value="87%" subtitle="Falta: prueba proyectiva" [progress]="87"
      [isProgress]="true" routerLink="/alumni/perfil">
    </app-stat-card>

    <app-stat-card 
      title="Pruebas completadas" 
      [value]="completedTests + '/' + totalTests" 
      [badgeText]="allCompleted ? 'Completado' : 'Pendiente: proyectiva'" 
      [badgeType]="allCompleted ? 'success' : 'warning'"
      routerLink="/alumni/pruebas">
    </app-stat-card>

    <app-stat-card title="Postulaciones activas" value="4" badgeText="2 en revisión" badgeType="info">
    </app-stat-card>

    <app-stat-card title="Vacantes disponibles" value="127" badgeText="8 nuevas hoy" badgeType="success">
    </app-stat-card>
  </div>

  <!-- Middle Row -->
  <div class="middle-row">
    <app-dimension-results class="col-left"></app-dimension-results>
    <app-cv-status class="col-right"></app-cv-status>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">
    <app-recommended-jobs class="col-left"></app-recommended-jobs>
    <app-applications-list class="col-right"></app-applications-list>
  </div>

  <!-- Footer Banner -->
  <div class="report-banner">
    <div class="banner-content">
      <div class="banner-text">
        <h3>Reporte de idoneidad disponible</h3>
        <p>Descarga tu reporte técnico con fortalezas, áreas de oportunidad y puntajes por dimensión con logo institucional.</p>
      </div>
      <button class="btn-download" (click)="downloadReport()" [disabled]="isGeneratingPdf">
        {{ isGeneratingPdf ? 'Generando...' : 'Descargar PDF' }}
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Plantilla oculta para PDF -->
  <div style="position: absolute; left: -9999px; top: -9999px;">
    <app-report-template id="report-content" [profile]="alumniProfile" [tests]="allTests"></app-report-template>
  </div>
</div>
