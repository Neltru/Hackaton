<div class="dashboard-container">
  
  <!-- Welcome Banner -->
  <div class="welcome-banner">
    <div class="welcome-content">
      <div class="welcome-text">
        <p class="greeting">¡Hola de nuevo, {{ alumniProfile?.nombre || 'Graduado' }}!</p>
        <h1>Tu Futuro Profesional</h1>
        <p class="date">{{ currentDate | date:'EEEE, d MMMM yyyy':'':'es' | titlecase }}</p>
      </div>
      <div class="stats-mini">
        <div class="mini-stat">
          <span class="label">Puntaje SOT</span>
          <span class="value">{{ alumniProfile?.score_sot || '85' }}</span>
        </div>
        <div class="divider"></div>
        <div class="mini-stat">
          <span class="label">Nivel</span>
          <span class="value">A+</span>
        </div>
      </div>
    </div>
    <div class="banner-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
    </div>
  </div>

  <div class="dashboard-grid">
    <!-- Top KPI Cards -->
    <div class="kpi-row">
      <app-stat-card title="Perfil completado" value="87%" subtitle="Falta: prueba proyectiva" [progress]="87"
        [isProgress]="true" routerLink="/alumni/perfil">
      </app-stat-card>

      <app-stat-card 
        title="Pruebas completadas" 
        [value]="completedTests + '/' + totalTests" 
        [badgeText]="allCompleted ? 'Completado' : 'Pendiente: proyectiva'" 
        [badgeType]="allCompleted ? 'success' : 'warning'"
        routerLink="/alumni/pruebas">
      </app-stat-card>

      <app-stat-card title="Postulaciones activas" value="4" badgeText="2 en revisión" badgeType="info">
      </app-stat-card>

      <app-stat-card title="Vacantes disponibles" value="127" badgeText="8 nuevas hoy" badgeType="success">
      </app-stat-card>
    </div>

    <!-- Main Dashboard Body -->
    <div class="main-body">
      <div class="left-column">
        <app-dimension-results></app-dimension-results>
        <app-recommended-jobs></app-recommended-jobs>
      </div>
      
      <div class="right-column">
        <app-cv-status></app-cv-status>
        <app-applications-list></app-applications-list>
        
        <!-- Report Banner integrated into sidebar -->
        <div class="report-box">
          <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </div>
          <h3>Reporte de Idoneidad</h3>
          <p>Obtén tu certificado técnico oficial con validez institucional.</p>
          <button class="btn-download" (click)="downloadReport()" [disabled]="isGeneratingPdf">
            {{ isGeneratingPdf ? 'Generando...' : 'Descargar PDF' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden PDF Template -->
  <div style="position: absolute; left: -9999px; top: -9999px;">
    <app-report-template id="report-content" [profile]="alumniProfile" [tests]="allTests"></app-report-template>
  </div>
</div>
