<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Gestión de Vacantes</h1>
      <p class="page-subtitle">Administra tus ofertas laborales publicadas.</p>
    </div>
    <!-- No new job button here to avoid duplicating the restriction logic, 
         or we can just let the topbar handle creation. We'll add it here for UX. -->
    <!-- Assuming the topbar is enough, but a link here is standard -->
  </div>

  <div class="card-container">
    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th>Puesto</th>
            <th>Área</th>
            <th>Estatus</th>
            <th>Postulaciones</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let vacante of vacantes$ | async">
            <td>
              <div class="job-title">{{ vacante.title }}</div>
              <div class="job-salary">{{ vacante.salary }}</div>
            </td>
            <td>{{ vacante.area }}</td>
            <td>
              <span class="badge" [ngClass]="{
                'success': vacante.status === 'Activa',
                'warning': vacante.status === 'Pausada',
                'neutral': vacante.status === 'Cerrada'
              }">{{ vacante.status }}</span>
            </td>
            <td>{{ vacante.applicationsCount }}</td>
            <td>
              <div class="actions">
                <button class="btn-icon view-candidates" [routerLink]="['/company/vacantes', vacante.id, 'candidatos']" title="Ver Candidatos">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </button>
                <button class="btn-icon edit" [routerLink]="['/company/vacantes/edit', vacante.id]" title="Editar">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                </button>
                <button *ngIf="vacante.status === 'Activa'" class="btn-icon pause" (click)="pausar(vacante.id)" title="Pausar">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button *ngIf="vacante.status !== 'Cerrada'" class="btn-icon delete" (click)="darDeBaja(vacante.id)" title="Dar de baja">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
