<div class="layout-wrapper">
  <app-company-sidebar></app-company-sidebar>
  
  <div class="main-content">
    <header class="topbar">
      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Buscar egresados, postulaciones...">
      </div>
      
      <div class="topbar-actions">
        <div class="status-badge" *ngIf="hasAgreement" title="Empresa con convenio vigente">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          CONVENIO UT
        </div>

        <button class="icon-btn" title="Notificaciones">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge">5</span>
        </button>
        <button class="logout-btn" routerLink="/login">
          Cerrar Sesión
        </button>
      </div>
    </header>

    <main class="page-body">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
